<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarklet Manager</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Manage Scripts</h1>
      <p class="sub">Add your own bookmarklets. Paste a <code>javascript:</code> bookmarklet or raw JavaScript, and the system will automatically decode it.</p>
    </header>

    <section class="card">
      <h2 id="form-title">Add Script</h2>
      <form id="script-form">
        <label>
          Name
          <input type="text" id="name" placeholder="e.g., C1 Shopping Trips" required />
        </label>
        <label>
          Code (javascript: bookmarklet or raw JS)
          <textarea id="code" rows="10" placeholder="javascript:(()=>{ ... })();  or  alert(document.title)" required></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" class="primary-btn" id="save-btn">Save</button>
          <button type="button" class="ghost-btn hidden" id="cancel-btn">Cancel</button>
          <span id="form-hint" class="hint"></span>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Saved Scripts (<span id="count">0</span>)</h2>
      <ul id="list"></ul>
      <p id="list-empty" class="empty hidden">No scripts yet.</p>
    </section>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
