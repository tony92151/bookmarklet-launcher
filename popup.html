<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>📋 Bookmarklet Manager</h1>
  </header>

  <div id="setup-banner" class="banner hidden">
    <strong>Allow user scripts needs to be enabled</strong>
    <p>Go to <code>chrome://extensions</code> → This extension's "Details" → Enable "Allow user scripts" to run scripts.</p>
    <p class="banner-hint">Already enabled but still seeing this? Click "🔄 Reload" on the extension card, or restart the browser.</p>
    <button id="open-extensions" class="link-btn">Open Extensions Page</button>
  </div>

  <div id="status" class="status hidden"></div>

  <ul id="script-list"></ul>

  <div id="empty" class="empty hidden">
    <p>No scripts yet</p>
    <button id="add-first" class="primary-btn">Add First Script</button>
  </div>

  <footer>
    <button id="manage" class="link-btn">⚙️ Manage Scripts</button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
